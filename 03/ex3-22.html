    <title>Document</title>
  </head>
  <body>
    <script>
      let num1 =  prompt("50미만의 수 입력")
      let num2 = prompt("50미만의 수 입력")
        console.log(num1);
        console.log(num2);
        
        
      if(num1 == null || num2==null) {
          alert('입력을 취소하셨습니다.')
      }else if(num1 == '' || num2 == ''){
        alert('숫자를 입력하세요')
      }
      else if (Number(num1) <50 ||  Number(num2) < 50) {
             alert("두개의 숫자중 최소 한개는 50보다 작네요");
      } else{
          alert ("두개의 숫자 모두 50보다 큽니다");
      }
    </script>
  </body>
