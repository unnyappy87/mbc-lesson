<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>시간이후</h1>
    <pre>
        setTimeout(콜백함수,시간)
        지정된 시간이후 함수 호출 
     </pre
    >
    <script>
      let num = 15;
      const timer1 = () => document.write(`${num}초지남`);
      const stop1 = setTimeout(timer1, num * 1000);
      clearTimeout(stop1);
    </script>

    <h1>간격실행</h1>
    <pre>
          setInterval(콜백함수, 시간)
          clearInterval( setInterval의 ID)
    </pre>
    <script>
      let n = 1;
      const timer2 = () => document.write(`${n}초마다 실행`);
      setInterval(timer2, n * 1000);
      const stop2 = setInterval(timer2, n * 1000);
      setTimeout(() => {
        clearInterval(stop2);
        console.log("타이머가 종료되었습니다.");
      }, 3500);
    </script>
    <!--requestAnimationFrame()-->
  </body>
</html>
