<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let sum = 0;
      //전역변수 - 전체지역에 다 유요한 변수
      // n - 지역변수 : 특정지역에서만 유요한 변수
      let n ;
      for (n = 1; n < 101; n++) {
        sum += n
      }
      document.write(`${sum} <br>${n}`);
    </script>
  </body>
</html>
