<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>세션 선택 - switch문</title>
    <link rel="stylesheet" href="css/switch.css" />
  </head>
  <body>
    <script>
      let session = prompt("관심 세션을 선택하세요,1-마케팅, 2-개발, 3-디자인");
      switch (session) {
        //case 비교값, 비교식 : 기능
        case "1" : document.write("<p>마케팅 세션은<strong>201호</strong>에서 진행합니다.</p>");
          
          break;
        case "2" :  document.write("<p>개발 세션은<strong>202호</strong>에서 진행합니다.</p>");
         
          break;
         
        case "3" : document.write("<p>디자인 세션은<strong>203호</strong>에서 진행합니다.</p>");
          break;
          default :  document.write("<p>세션 문의는 <strong>담당자님</strong>께서 담당합니다.</p>");
      }
    </script>
  </body>
</html>
