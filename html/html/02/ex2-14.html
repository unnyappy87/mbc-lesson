<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>형성퀴즈</title>
    <style>
     *{
        margin: 0px;
        padding: 0px;
        color: #000000;
        font-family: sans-serif;
     }
     h1{
        font-size: 48px;
     }
     h1,h2{
        font-weight: bold;
        padding: 15px; 
        padding-top: 15px;
        padding-bottom: 15px;

     }
     body{
        padding: 20px;
     }
     ul{
        padding: 20px;
        padding-left: 40px;
     }
     li p{
        color: green;
        font-size: 14px;
        margin-top: 20px;
     }
     h3>span{
        color: red;
        margin-left: 15px;
     }
     p span{
        color: blue;
     }
     #hearth{
        background:#d3d3d3;
        border: 1px solid;
        padding: 15px;
     }
      div h2{
        color: red;
        font-size: 28px;
      }
      div p{
        font-size: 14px;
      }
      .tea1{
        background-color: beige;
        padding: 20px;
        padding-bottom: 40px;
      }
      .tea2{
        padding: 50px;
      }
      .tea3{
        background: #fff;
        padding: 30px;
        padding-bottom: 40px;
      }
      
    </style>
</head>
<body>
    <h1>건강한 하루</h1>
    <div id="hearth">
        <h2>건강해지는 차</h2>
        <p>머리와 피부에 좋은차는 어떤것일까. 
        <span>차의종류에</span> 대해 알아보도록 합니다.</p>
        <ul>
            <li class="tea1">
                <h3>대나무차<span>1,5000원</span></h3>
                <p>얼굴에 물을 주는 효과가 있다.</p>
            </li>
            <li class="tea2">
                <h3>감일차<span>1,4000원</span></h3>
                <p>빈혈있는 사람에게 효과가 있다.</p>
            </li>
            <li class="tea3">
                <h3>결명자차<span>20,000원</span></h3>
                <p>눈을 밝혀주는 효과가 있다.보리차와 비슷하난 맛이 더 은은하고 구수하다.</p>
            </li>
        </ul>
    </div>

</body>
</html>
