<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heading</title>
  </head>
  <body>
    <!-- heading : 웹페이지의 제목을 표시 -->
    <!-- 제목의 중요도에 따라 작은숫자로 표시 -->
    <!-- h1은 페이지에서 단 한개만 사용(검색엔진의 최적화) -->
    <!-- h$*6 -->
    <h1>Title</h1>
    <h2>Title</h2>
    <h3>Title</h3>
    <h4>Title</h4>
    <h5>Title</h5>
    <h6>Title</h6>
  </body>
</html>
