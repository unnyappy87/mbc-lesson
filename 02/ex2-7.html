<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클래스선택</title>
    <style>
        .happy{
            color: #ff0000;
        }
        .tea{
            color: #0000ff;
        }
        .food{
            color: #00ff00;
        }
        .t_center{
            text-align: center;
        }
    </style>
  </head>
  <body>
    <p class="happy">우리를 <span class="tea">기쁘게</span> 하는 것들</p>
    <p class="tea t_center">머리가 좋아지는 음식</p>
    <p class="food t_center">건강에 좋은 차</p>
  </body>
</html>
