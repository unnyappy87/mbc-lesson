<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box,
      .box1,
      .box2 {
        width: 100px;
        height: 100px;
        background: orange;
        margin: 50px;
        transition-property: transform;
        transition-duration: 1s;
        transition-timing-function: linear(0, 0.544 5.5%, 0.947 11.5%, 1.213 18.1%, 1.298 21.7%, 1.352 25.5%, 1.372 28.2%, 1.379 31.1%, 1.374 34.2%, 1.357 37.6%, 1.307 43.7%, 1.121 61.8%, 1.074 67.8%, 1.04 73.7%, 1.007 84.7%, 1);
      }
      .box2 {
        transform: skewX(15deg) skewY(35deg) skew(15deg,35deg);
      }
      .box:hover {
        transform: translate(50px, 50px) rotate(180deg) scale(1.5);
      }
      .box1:hover::after {
        width: 100%;
      }
      .box1 {
        overflow: hidden;
        position: relative;
      }
      .box1::after {
        position: absolute;
        left: 50px;
        top: calc(100% - 5px);
        content: "";
        /* display: block; */
        width: 0%;
        height: 5px;
        background: red;
        transform: translate(-50%, 0);
        transition: width 0.5s;
      }
      .box1::before {
        position: absolute;
        content: "";
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.301);
        backdrop-filter: blur(1.5px);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0);
        z-index: 1;
        transition: all 0.5s;
      }
      .box1:hover:before {
        transform: scale(1.5);
        transform: translate(-50%, -50%) scale(1.5);
      }
    </style>
  </head>
  <body>
    <div class="box">2D Transform</div>
    <div class="box1">2D Transform</div>
    <div class="box2">2D Transform</div>
  </body>
</html>
