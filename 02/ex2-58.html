<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>box-sizing</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        background: url(imgs/img/bg_grid.png);
      }

      p {
        background-color: rgba(255, 255, 0, 0.6);
        border: 10px solid rgba(0, 0, 0, 0.5);
        width: 600px;
        height: 100px;
        margin-bottom: 10px;
      }

      .sizing {
        box-sizing: border-box;
        /* 박스크기의 계산기준 지정 */
      }

      .sizing_list {
        width: 500px;
        /* margin-top: 200px;
      margin-left:auto;
      margin-right:auto;*/
        margin: 200px auto;
        padding: 50px;
        height: 200px;
        box-sizing: content-box;
        box-sizing: border-box;
        list-style: none;
      }
      .sizing_list li {
        width: 24%;
        height: 100%;
        background: rgba(219, 95, 95, 0.8);
        text-align: center;
        display: inline-block;
        line-height: 100px;
      }
      .sizing_list li:nth-child(odd) {
        background: rgba(219, 195, 95, 0.5);
      }
      .sizing_list li a {
        text-decoration: none;
        color: white;
        font-size: 1rem;
      }
    </style>
  </head>

  <body>
    <p>It's impossible not only starting good but also keeping it firm!!</p>
    <p class="sizing">It's impossible not only starting good but also keeping it firm!!</p>
    <ul class="sizing_list">
      <li><a href="#">Company</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">Custommer</a></li>
      <li><a href="#">Community</a></li>
    </ul>
  </body>
</html>
