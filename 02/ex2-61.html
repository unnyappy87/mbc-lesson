<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .fade{
            height: 300px;
            background: url('./imgs/img/lotus.png') no-repeat  center / cover;
            -webkit-mask-image:linear-gradient(to bottom, black 60%,  transparent);
            /* vendor prefix : 제조사 접두어  - 표준으로 확정되기전 브라우저가 개발한 신기능*/
            mask-image: linear-gradient(to bottom,black 60%, transparent);
            /* 
               -webkit- :크롬,엣지,사파리
               -o- : 오패라
            */
        }
    </style>
</head>
<body>
    <div class="fade"></div>
</body>
</html>
