<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>animation</title>
    <style>
      .heart {
        font-size: 100px;
        color: pink;
        text-align: center;
        animation-name: beat;
        animation-duration: 3s;
        animation-iteration-count: 5;
        animation-iteration-count: infinite;
        animation-fill-mode: forwards;
        animation-direction: alternate;
        animation-timing-function: cubic-bezier(0.59,-0.04, 0.35, 1.26);
        animation-play-state: paused;
        user-select: none;
      }
      .heart:hover{
        animation-play-state: running;
      }
      @keyframes  beat {
        0%{
            transform: scale(0.5);
        }
        50%{
            transform: scale(1.1);
        }
        52.5%{
            transform: scale(0.9);
        }
        55%{
            transform: scale(1);
        }
        100%{
            transform: scale(1.5);
        }
      }
    </style>
  </head>
  <body>
    <div class="heart">❤</div>
  </body>
</html>
