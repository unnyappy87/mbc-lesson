<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>flex 정렬</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      .flex-container{
        display: flex;
        justify-content: space-around;
        text-align: center;
        line-height: 100px;
        margin:auto;
      }
      .item {
        display: inline-block;
        width: 100px;
        height: 100px;
        background: tomato;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <div class="flex-container">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
    </div>
  </body>
</html>
