<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 선택자 </title>
    <style>
        p{
            color: red;
        
        }
        .tea{
            color: #0000ff;
        }
        #tea{
            color: #ff00ff;
        }
        #food{
            color: blueviolet;
        }
    </style>
</head>
<body>
    <p>우리를 <span class="tea">기쁘게</span> 하는 것들</p>
    <p id="tea">건강에 좋은 차</p>
    <p id="food">머리가 좋아지는 음식</p>
</body>
</html>
