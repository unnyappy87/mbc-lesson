<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하위(자식)선택자</title>
    <style>
        /* 자손선택자 */
      .blue p{
        font-size: 32px;
      }
      .blue>p{
        font-size: 10px;
      }
      
    </style>
  </head>
  <body>
    <div class="blue">
      <p>7월의 여행지</p>
      <p>8월의 여행지</p>
      <ul>
        <li><p>1주차 여행지</p></li>
        <li><p>2주차 여행지</p></li>
      </ul>
    </div>
    <p>내년의 여행지</p>
  </body>
</html>
