<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Grid Layout</title>
    <style>
      .gallery {
        width: 700px;
        margin: 20px auto;
      }

      .gallery img {
        width: 100%;
        height: 100%;
        border-radius: 10px;
      }
      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 180px);
        grid-template-areas:
          "photo1 photo1 photo2"
          "photo1 photo1 photo3"
          "photo4 photo5  photo6";
      }
      .photo1 {
        grid-area: photo1;
        gap: 30px;
      }
      .photo2 {
        grid-area: photo2;
        gap: 30px;
      }
      .photo3 {
        grid-area: photo3;
        gap: 30px;
      }
      .photo4 {
        grid-area: photo4;
        gap: 30px;
      }
      .photo5 {
        grid-area: photo5;
        gap: 30px;
      }
      .photo6 {
        grid-area: photo6;
        gap: 30px;
      }
    </style>
  </head>
  <body>
    <div class="gallery">
      <img class="photo1" src="https://placedog.net/640/480/?id=5" alt="따뜻한 차가 있는 겨울 풍경" />
      <img class="photo2" src="https://placedog.net/640/480/?id=78" alt="남극 펭귄" />
      <img class="photo3" src="https://placedog.net/640/480/?id=17" alt="눈이 가득 쌓인 시골 풍경" />
      <img class="photo4" src="https://placedog.net/640/480/?id=28" alt="오로라가 보이는 밤 풍경" />
      <img class="photo5" src="https://placedog.net/640/480/?id=30" alt="눈 쌓인 배경" />
      <img class="photo6" src="https://placedog.net/640/480/?id=74" alt="나뭇가지에 앉아있는 빨간 새" />
    </div>
  </body>
</html>
