<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>position absolute & relative</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      .parent {
        width: 300px;
        height: 300px;
        background: #eee;
      }
      .child {
        width: 100px;
        height: 100px;
        background: rgba(255, 0,0,0.5);
        border: 8px solid;
        box-sizing: border-box;
      }
      .child:nth-child(2) {
        width: 100px;
        height: 100px;
        background-color: rgba(0, 255, 115, 0.562);
      }
      .child:nth-child(3) {
        width: 100px;
        height: 100px;
        background-color: rgba(0, 26, 255, 0.596);
      }
      .child::after{
        font-size: 20px;
        color: white;
      }
      .child:nth-child(1)::after{
        content: '1';
      }
      .child:nth-child(2)::after{
        content: '2';
      }
      .child:nth-child(3)::after{
        content: '3';
      }
    </style>
    <!-- relative -->
    <!-- <link rel="stylesheet" href="./css/ex2-61a.css"> -->
      <!-- absolute,fixed-->
     <!-- <link rel="stylesheet" href="./css/ex2-61 b.css"> -->
    <!-- <link rel="stylesheet" href="./css/ex2-61 c.css"> -->
     <link rel="stylesheet" href="./css/ex2-61d.css">
  </head>
  <body>
    <div class="parent">
      <div class="child red"></div>
      <div class="child green"></div>
      <div class="child skyblue"></div>
    </div>
  </body>
</html>
