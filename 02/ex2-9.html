<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하위(자손)선택자</title>
    <style>
      .blue p {
        color: blue;
      }
      .blue li{
        color: blue;
      }
      body p {
        color: blueviolet;
      }
      body .blue{
        background: skyblue;
        border: 1px solid #000000;
      }
    </style>
  </head>
  <body>
    <div class="blue">
      <p>7월의 여행지</p>
      <p>8월의 여행지</p>
      <ul>
        <li>1주차 여행지</li>
        <li>2주차 여행지</li>
      </ul>
    </div>
    <p>내년의 여행지</p>
  </body>
</html>
