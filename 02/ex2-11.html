<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인접선택자</title>
    <style>
      span+p{
        font-size: 48px;
        font-weight: 600;
      }
      p + p {
        color: blue;
        font-size: 25px;
      }
      p + p + p {
        color: black;
        font-size: 25px;
      }

    </style>
  </head>
  <body>
    <span></span>
    <p>엑스포 안내</p>
    <p>책자를 배부하고 있습니다.</p>
    <p>안내데스크를 활용하시기 바랍니다.</p>
  </body>
</html>
