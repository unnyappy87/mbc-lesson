<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>transition</title>
    <style>
      .item {
        width: 200px;
        height: 100px;
        background: url(./imgs/img/bg_gray.png);
        color: white;
        text-align: center;
        line-height: 100px;
        cursor: pointer;
        transition-property: transform;
        transition-duration: 1s;
        transition-timing-function: linear(0, 0.453 7.8%, 0.803 16.1%, 1.048 24.9%, 1.132 29.5%, 1.194 34.4%, 1.227 38.4%, 1.245 42.5%, 1.25 46.9%, 1.242 51.7%, 1.2 60.5%, 1.038 84.9%, 1.009 92.5%, 1);
      }
      .item:hover {
        transform: scale(1.2);
      }
      .item:hover + .drop {
        display: block;
        opacity: 1;
      }
      .drop {
        width: 100px;
        height: 100px;
        background: url(./imgs/img/bg_checkbox.png);
        text-align: center;
        /* display: none; */
        opacity: 0;
        transition-property: opacity;
        transition-duration: 1s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">Hover Me</div>
      <div class="drop">click</div>
    </div>
  </body>
</html>
